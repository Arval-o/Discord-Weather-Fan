name: Watchdog

on:
  workflow_run:
    workflows: ["Weather Bots"]
    types:
      - completed

jobs:
  restart_weather_bots:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Watchdog Workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: Arval-o/Discord-Weather-Fan
          event-type: trigger-spc         
