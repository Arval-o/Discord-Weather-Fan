name: Weather Bots

on:
  schedule:
    - cron: "*/5 * * * *"  # Runs every 5 minutes (GitHub limit)
  workflow_dispatch:       # Allows manual run

permissions:
  contents: write

jobs:
  run-bots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # fetch full history

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests feedparser

      - name: Run bots loop (every 2 minutes)
        run: |
          for i in {1..20}
          do
            echo "Run #$i"

            python spc_bot.py
            python warnings_bot.py

            echo "Sleeping for 120 seconds..."
            sleep 120
          done
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit updated state files
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add last_warnings.txt last_id.txt
          git commit -m "Update bot state files" || echo "No changes to commit"
          
          # 🔑 Sync with remote before pushing
          git pull --rebase origin main
          
          git push https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:main
